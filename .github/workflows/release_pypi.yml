name: Release PyPI

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  # CRITICAL: Required for PyPI Trusted Publishing (OIDC)
  id-token: write
  contents: read

jobs:
  publish-pypi:
    name: Build and publish PyPI wrapper
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Ensure this matches the "Environment" name in your PyPI project settings
    environment: pypi

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true

      - name: Generate Python package from Cargo.toml
        # This script creates the .release/python directory
        run: uv run scripts/release_pypi.py

      - name: Build and Publish
        # We move into the generated directory so uv finds the local pyproject.toml
        working-directory: .release/python
        run: |
          uv build
          uv publish
