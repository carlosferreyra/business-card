name: Release npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Build and publish npm wrapper
    if: >-
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate npm package from Cargo.toml
        run: bun run scripts/release_npm.ts

      - name: Build wrapper with Bun
        working-directory: .release/npm
        run: bun run build

      - name: Publish to npm
        working-directory: .release/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
