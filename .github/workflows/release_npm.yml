name: Release npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Build and publish npm wrapper
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate and Build Wrapper
        run: bun run scripts/release_npm.ts

      - name: Publish to npm
        # THE FIX: Point npm to the folder instead of changing directories.
        # This ensures npm sees the .npmrc auth file in the repository root.
        run: npm publish .release/npm --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
