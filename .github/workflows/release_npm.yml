name: Release npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  # Required for generating the provenance attestation (OIDC)
  id-token: write

jobs:
  publish-npm:
    name: Build and publish npm wrapper
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        # We use Node primarily for the npm publish command and registry auth
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate and Build Wrapper
        # This script now handles: Metadata parsing -> TS generation -> Bun.build (minification)
        run: bun run scripts/release_npm.ts

      - name: Publish to npm
        working-directory: .release/npm
        run: npm publish --provenance --access public
        env:
          # Note: Even with provenance, npm currently requires a token for the upload
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
