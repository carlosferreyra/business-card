name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'python/**'
  pull_request:
    paths:
      - 'python/**'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish-python:
    name: Build and publish Python package
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: 'latest'

      - name: Copy config.json to package
        run: cp config.json python/src/carlosferreyra/

      - name: Build package
        working-directory: python
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: python/dist/
        if: startsWith(github.ref, 'refs/tags/v')
