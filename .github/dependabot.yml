version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # release.yml is generated by cargo-dist, and direct bumps to these
      # actions make cargo-dist's generated-workflow check fail.
      - dependency-name: actions/checkout
      - dependency-name: actions/download-artifact
      - dependency-name: actions/upload-artifact
